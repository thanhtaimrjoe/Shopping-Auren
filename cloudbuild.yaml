steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/shopping-memo/backend:latest
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/shopping-memo/backend:$BUILD_ID
      - -f
      - Dockerfile
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/shopping-memo/backend:latest

  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - shopping-memo-backend
      - --image
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/shopping-memo/backend:latest
      - --region
      - asia-southeast1
      - --platform
      - managed
      - --allow-unauthenticated
      - --memory
      - 256Mi
      - --cpu
      - "0.5"
      - --timeout
      - "60"
      - --max-instances
      - "20"

images:
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/shopping-memo/backend:latest

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
