[pytest]
# Pytest configuration for Shopping Memo API tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Test paths
testpaths = tests

# Markers
markers =
    unit: Unit tests
    integration: Integration tests requiring database
    auth: Tests requiring authentication
    slow: Slow running tests

# Asyncio configuration
asyncio_mode = auto
